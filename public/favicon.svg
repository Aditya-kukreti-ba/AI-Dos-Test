<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#2dd4bf"/>
      <stop offset="50%"  stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#150c3a"/>
    </linearGradient>
    <radialGradient id="orb" cx="38%" cy="32%" r="65%">
      <stop offset="0%"   stop-color="#fde68a"/>
      <stop offset="50%"  stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#78350f"/>
    </radialGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="3.5" flood-color="#2dd4bf" flood-opacity="0.6"/>
    </filter>
    <filter id="orbglow">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#f59e0b" flood-opacity="0.8"/>
    </filter>
  </defs>

  <!-- Outer hex body -->
  <polygon points="50,3 94,26 94,74 50,97 6,74 6,26"
    fill="url(#g2)" stroke="url(#g1)" stroke-width="2.5" filter="url(#glow)"/>

  <!-- Diagonal wireframe lines -->
  <line x1="50" y1="3"  x2="50" y2="97" stroke="#2dd4bf" stroke-width="0.5" stroke-opacity="0.2"/>
  <line x1="6"  y1="26" x2="94" y2="74" stroke="#2dd4bf" stroke-width="0.5" stroke-opacity="0.2"/>
  <line x1="94" y1="26" x2="6"  y2="74" stroke="#2dd4bf" stroke-width="0.5" stroke-opacity="0.2"/>

  <!-- Inner hex panel -->
  <polygon points="50,20 76,35 76,65 50,80 24,65 24,35"
    fill="#050b18" fill-opacity="0.97" stroke="#2dd4bf" stroke-width="1.3" stroke-opacity="0.7"/>

  <!-- Spokes to center -->
  <line x1="50" y1="28" x2="50" y2="48" stroke="#2dd4bf" stroke-width="1"   stroke-opacity="0.5"/>
  <line x1="67" y1="38" x2="50" y2="48" stroke="#2dd4bf" stroke-width="1"   stroke-opacity="0.5"/>
  <line x1="67" y1="58" x2="50" y2="48" stroke="#2dd4bf" stroke-width="1"   stroke-opacity="0.5"/>
  <line x1="50" y1="68" x2="50" y2="48" stroke="#2dd4bf" stroke-width="1"   stroke-opacity="0.5"/>
  <line x1="33" y1="58" x2="50" y2="48" stroke="#2dd4bf" stroke-width="1"   stroke-opacity="0.5"/>
  <line x1="33" y1="38" x2="50" y2="48" stroke="#2dd4bf" stroke-width="1"   stroke-opacity="0.5"/>

  <!-- Ring edges -->
  <polygon points="50,28 67,38 67,58 50,68 33,58 33,38"
    fill="none" stroke="#2dd4bf" stroke-width="0.9" stroke-opacity="0.38"/>

  <!-- Neural nodes -->
  <circle cx="50" cy="28" r="3.2" fill="#2dd4bf" fill-opacity="0.95"/>
  <circle cx="67" cy="38" r="3.2" fill="#2dd4bf" fill-opacity="0.95"/>
  <circle cx="67" cy="58" r="3.2" fill="#2dd4bf" fill-opacity="0.95"/>
  <circle cx="50" cy="68" r="3.2" fill="#2dd4bf" fill-opacity="0.95"/>
  <circle cx="33" cy="58" r="3.2" fill="#2dd4bf" fill-opacity="0.95"/>
  <circle cx="33" cy="38" r="3.2" fill="#2dd4bf" fill-opacity="0.95"/>

  <!-- Center orb halo -->
  <circle cx="50" cy="48" r="11" fill="#f59e0b" fill-opacity="0.18"/>

  <!-- Center orb -->
  <circle cx="50" cy="48" r="7" fill="url(#orb)" filter="url(#orbglow)"/>
  <ellipse cx="47.5" cy="45" rx="2.2" ry="1.5" fill="white" fill-opacity="0.4"/>

  <!-- Outer vertex dots -->
  <circle cx="50" cy="3"  r="2.5" fill="#2dd4bf" fill-opacity="0.85"/>
  <circle cx="94" cy="26" r="2.5" fill="#2dd4bf" fill-opacity="0.85"/>
  <circle cx="94" cy="74" r="2.5" fill="#2dd4bf" fill-opacity="0.85"/>
  <circle cx="50" cy="97" r="2.5" fill="#2dd4bf" fill-opacity="0.85"/>
  <circle cx="6"  cy="74" r="2.5" fill="#2dd4bf" fill-opacity="0.85"/>
  <circle cx="6"  cy="26" r="2.5" fill="#2dd4bf" fill-opacity="0.85"/>
</svg>
